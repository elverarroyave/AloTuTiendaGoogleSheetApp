<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Ingreso Egreso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <?!= includes("componentCss.html"); ?>
    <style>
        .clock-container {
            font-family: monospace;
            font-size: 1.2rem;
            text-align: right;
            color: var(--text-color);
            margin-bottom: 1rem;
        }
        .transaction-positive { color: var(--success); }
        .transaction-negative { color: var(--error); }
    </style>
</head>

<body>
    <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center mb-4 px-2">
            <div>
                <h3>Control Ingresos y Egresos</h3>
                <p class="text-muted small mb-0">Registre movimientos de caja.</p>
            </div>
            <div id="clock" class="clock-container">--/--/---- --:--:--</div>
        </div>

        <form id="inOutForm" class="card-form mb-5" onsubmit="handleSubmit(event)">
            
            <div class="mb-3">
                <label for="type" class="form-label">
                    Tipo de Transacción<span class="required-asterisk">*</span>
                </label>
                <select id="type" name="type" class="form-select" required onchange="validateForm()">
                    <option value="NO_SELECTED" selected>Seleccione...</option>
                    <option value="INGRESO">Ingreso</option>
                    <option value="EGRESO">Egreso</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">
                    Categoría<span class="required-asterisk">*</span>
                </label>
                <select id="category" name="category" class="form-select" required onchange="validateForm()" disabled>
                    <option value="" selected>Seleccione primero un tipo de transacción ...</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="value" class="form-label">
                    Valor<span class="required-asterisk">*</span>
                </label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" id="value" name="value" 
                            placeholder="0" min="1" required oninput="validateForm()">
                </div>
            </div>

            <div class="mb-3">
                <label for="detalle" class="form-label">
                    Detalle (Opcional)
                </label>
                <input type="text" class="form-control" id="detalle" name="detalle" 
                        placeholder="Descripción adicional...">
            </div>

            <div class="mb-3">
                <label for="paymentMethod" class="form-label">
                    Método de Pago (Opcional)
                </label>
                <select id="paymentMethod" name="paymentMethod" class="form-select">
                    <option value="" selected>Seleccione...</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="B/bia K">Bancolombia Katy</option>
                    <option value="B/bia E">Bancolombia Elver</option>
                    <option value="Nequi K">Nequi Katy</option>
                    <option value="Nequi E">Nequi Elver</option>
                    <option value="Addi">Addi</option>
                    <option value="SisteCredito">SisteCredito</option>
                    <option value="BoldDatafono">BoldDatafono</option>
                </select>
            </div>

        </form>

        <div class="sticky-footer">
            <button type="submit" id="btnSubmit" class="btn-primary-custom" form="inOutForm" disabled>
                Guardar Transacción
            </button>
        </div>
    </div>

    <!-- Generic Modal Overlay (Reused from example) -->
    <div class="modal-overlay" id="genericModalOverlay">
        <div class="custom-modal">
            <div class="modal-header-custom">
                <div class="modal-icon" id="modalIcon">
                    <span id="modalIconSign">✓</span>
                </div>
                <div class="modal-title-custom">
                    <h3 id="modalTitle">Título</h3>
                </div>
            </div>
            
            <div class="modal-body-custom">
                <p id="modalMessage"></p>
                <div id="modalContentList"></div>
            </div>
            
            <div class="modal-footer-custom">
                <!-- Two buttons logic -->
                <button class="modal-btn secondary-btn" id="modalCancelBtn" onclick="closeGenericModal()" style="display:none; margin-right: 10px;">Cancelar</button>
                <button class="modal-btn" id="modalActionBtn" onclick="closeGenericModal()">Entendido</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const DOM = {
            form: document.getElementById('inOutForm'),
            type: document.getElementById('type'),
            category: document.getElementById('category'),
            value: document.getElementById('value'),
            detalle: document.getElementById('detalle'),
            paymentMethod: document.getElementById('paymentMethod'),
            btnSubmit: document.getElementById('btnSubmit'),
            clock: document.getElementById('clock')
        };

        let dataCategories = [];

        // --- 1. Clock Logic ---
        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('es-CO', { hour12: false });
            DOM.clock.textContent = `${dateStr} ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Init immediately

        // --- 2. Validation ---
        function validateForm() {
            const typeValid = DOM.type.value !== "";
            const categoryValid = DOM.category.value !== "";
            const valueNumber = parseFloat(DOM.value.value);
            const valueValid = !isNaN(valueNumber) && valueNumber > 0;

            const isValid = typeValid && categoryValid && valueValid;
            DOM.btnSubmit.disabled = !isValid;
            return isValid;
        }

        // --- 3. Submission ---
        function handleSubmit(e) {
            e.preventDefault();
            if (!validateForm()) return;

            DOM.btnSubmit.disabled = true;
            DOM.btnSubmit.innerText = "Guardando...";

            const formData = {
                type: DOM.type.value,
                category: DOM.category.value,
                value: DOM.value.value,
                detalle: DOM.detalle.value || '',
                paymentMethod: DOM.paymentMethod.value || ''
            };

            google.script.run
                .withSuccessHandler(onSuccess)
                .withFailureHandler(onFailure)
                .addIngresoEgreso(formData);
        }

        function onSuccess(response) {
            DOM.btnSubmit.innerText = "Guardar Transacción";
            DOM.btnSubmit.disabled = false; // Re-enable if closed without action, but usually we reset
            
            // Format Value
            const val = parseFloat(DOM.value.value);
            const formattedValue = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP' }).format(val);
            const colorClass = DOM.type.value === 'INGRESO' ? 'transaction-positive' : 'transaction-negative';
            const displayValue = `<strong class="${colorClass}">${formattedValue}</strong>`;

            const detailsHtml = `
                <div class="modal-list-item"><span>Fecha</span> <strong>${response.date}</strong></div>
                <div class="modal-list-item"><span>Tipo</span> <strong>${DOM.type.value}</strong></div>
                <div class="modal-list-item"><span>Valor</span> ${displayValue}</div>
                <div class="modal-list-item"><span>Categoría</span> <strong>${DOM.category.value}</strong></div>
                <div class="modal-list-item"><span>Detalle</span> <span>${DOM.detalle.value || '-'}</span></div>
                <div class="modal-list-item"><span>Método Pago</span> <span>${DOM.paymentMethod.value || '-'}</span></div>
                <div class="modal-list-item"><span>Código</span> <strong>${response.code}</strong></div>
            `;

            showModal('success', 'Transacción Exitosa', 'El movimiento ha sido registrado correctamente.', detailsHtml, true);
        }

        function onFailure(error) {
            DOM.btnSubmit.disabled = false;
            DOM.btnSubmit.innerText = "Guardar Transacción";
            showModal('error', 'Error', 'No se pudo guardar la transacción: ' + error.message);
        }

        function resetForm() {
            DOM.form.reset();
            validateForm();
        }

        // --- 4. Modals ---
        let lastModalType = '';
        
        function showModal(type, title, message, htmlDetails = '', isSuccess = false) {
            const overlay = document.getElementById('genericModalOverlay');
            const iconContainer = document.getElementById('modalIcon');
            const iconSign = document.getElementById('modalIconSign');
            const titleEl = document.getElementById('modalTitle');
            const msgEl = document.getElementById('modalMessage');
            const listEl = document.getElementById('modalContentList');
            const btn = document.getElementById('modalActionBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');

            iconContainer.className = 'modal-icon';
            lastModalType = type;
            cancelBtn.style.display = 'none'; // Default hidden

            switch(type) {
                case 'success':
                    iconContainer.classList.add('success');
                    iconSign.textContent = '✓';
                    btn.textContent = 'Nueva Transacción';
                    btn.style.borderColor = 'var(--success)';
                    // Reuse cancel button as "Close" or implicit action
                    break;
                case 'error':
                    iconContainer.classList.add('error');
                    iconSign.textContent = '✕';
                    btn.textContent = 'Cerrar';
                    btn.style.borderColor = 'var(--error)';
                    break;
                default:
                    btn.textContent = 'Entendido';
            }

            titleEl.textContent = title;
            msgEl.textContent = message; 
            listEl.innerHTML = htmlDetails; 
            overlay.classList.add('active');
        }

        function closeGenericModal() {
            document.getElementById('genericModalOverlay').classList.remove('active');
            if (lastModalType === 'success') {
                resetForm();
            }
        }

        document.addEventListener('DOMContentLoaded', init);
        document.getElementById('type').addEventListener('change', setCategoriesSelect);

        function init(){
            loadInitData();
        }

        function loadInitData(){
            google.script.run.withSuccessHandler(populateSelectCategories).getDataIngresoEgreso();
        }

        function populateSelectCategories(dataString){
            console.log('getDataIngresoEgreso: ', dataString);
            dataCategories = JSON.parse(dataString);
            console.log('getDataIngresoEgreso: ', dataCategories);
        }

        function setCategoriesSelect(){
            const select = document.getElementById('category');
            const selectType = document.getElementById('type').value;
            console.log('selectType: ', selectType);
            selectType == 'NO_SELECTED' ? DOM.category.disabled = true : DOM.category.disabled = false;
            select.innerHTML = '';
            dataCategories.forEach(item => {
                if(item.REFERENCIA === selectType || selectType == 'AMBOS'){
                    const option = document.createElement('option');
                    option.value = item.NOMBRE || '';
                    option.textContent = item.NOMBRE || '';
                    option.dataset.referencia = item.REFERENCIA || '';
                    select.appendChild(option);
                }
            });
        }

        function resetForm(){
            DOM.form.reset();
            validateForm();
            DOM.category.disabled = true;
        }

    </script>
</body>
</html>
