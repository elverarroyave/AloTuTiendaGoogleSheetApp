<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Accordion Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tom Select CSS (bootstrap theme) -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.css" rel="stylesheet">
  </head>

  <body>
    <div class="mt-3 text-center">
      <h1>Nueva venta</h1>
    </div>

  <form class="container mt-4 mb-2" onsubmit="sendInformationSale(event, this)">

      <div class="accordion" id="accordionVenta">
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCliente">
              Cliente
            </button>
          </h2>

          <div id="collapseCliente" class="accordion-collapse collapse show" data-bs-parent="#accordionVenta">
            <div class="accordion-body">

              <div class="mb-2">
                <label for="clientName" class="form-label">Lista de cliente:</label>
                <select class="form-select" id="clientName" name="clientName" aria-label="Lista de cliente">
                </select>
              </div>

              <input type="hidden" id="clientCode" name="clientCode">

              <div class="mb-2">
                <label for="plazo" class="form-label">Plazo de pago:</label>
                <select class="form-select" id="plazo" name="plazo" aria-label="Plazo de pago">
                  <option value="UNO">Contado</option>
                  <option value="DOS">1 meses</option>
                  <option value="TRES">2 meses</option>
                  <option value="CUATRO">3 meses</option>
                </select>
              </div>

              <div class="row mb-2">
                <div class="col-md-6 mb-2">
                  <label for="amount" class="form-label">Cantidad:</label>
                  <input type="number" id="amount" name="amount" class="form-control" value="1">
                </div>

                <div class="col-md-6 d-flex align-items-end">
                  <div class="form-check ms-2">
                    <input class="form-check-input" type="checkbox" id="checkIsCredict" name="checkIsCredict">
                    <label class="form-check-label" for="checkIsCredict">Es crédito?</label>
                  </div>
                </div>
              </div>

              <div class="mb-2" id="firstPaymentContainer">
                <label for="firstPayment" class="form-label">Primer abono:</label>
                <input type="text" id="firstPayment" class="form-control" name="firstPayment" placeholder="$">
              </div>

              <div class="mb-2">
                <label for="paymentMethod" class="form-label">Método de pago:</label>
                <select id="paymentMethod" class="form-select" name="paymentMethod" aria-label="Método de pago">
                  <option value="" selected></option>
                  <option value="Efectivo">Efectivo</option>
                  <option value="B/bia K">Bancolombia Katy</option>
                  <option value="B/bia E">Bancolombia Elver</option>
                  <option value="Nequi Katy">Nequi Katy</option>
                  <option value="Addi">Addi</option>
                  <option value="SisteCredito">SisteCredito</option>
                  <option value="BoldDatafono">BoldDatafono</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseProducto">
              Producto
            </button>
          </h2>

          <div id="collapseProducto" class="accordion-collapse collapse" data-bs-parent="#accordionVenta">
            <div class="accordion-body">
              <div class="mb-2">
                <label for="productName" class="form-label">Lista producto:</label>
                <select class="form-select" id="productName" name="productName" aria-label="Lista de producto">
                  
                </select>
              </div>

              <input type="hidden" id="productCode" name="productCode" readonly>

              <div class="mb-2">
                <label for="priceProduct" class="form-label mb-1">Precio:</label>
                <input type="text" class="form-control-plaintext" id="priceProduct" name="priceProduct" readonly>
              </div>

              <div class="mb-2">
                <label for="stockProduct" class="form-label mb-1">cantidad disponible:</label>
                <input type="text" class="form-control-plaintext" id="stockProduct" readonly>
              </div>
            </div>
          </div>
        </div>
        
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSocio">
              Socio
            </button>
          </h2>

          <div id="collapseSocio" class="accordion-collapse collapse" data-bs-parent="#accordionVenta">
            <div class="accordion-body">
              <select id="socio" class="form-select" name="socio" aria-label="Sin socio asociado">
                <option value="" selected>Seleccione socio...</option>
                <option value="YINA ATENCIA">Yina Atencia</option>
                <option value="KATY IRIARTE">Katy Iriarte</option>
                <option value="YARIS RODRIGUEZ">Yaris Rodriguez</option>
                <option value="MARIA PATERNINA">Maria Paternina</option>
                <option value="ELVER ARROYAVE">Elver Arroyave</option>
                <option value="KAREN EDITH BRACAMONTE">Karen Bracamonte</option>
                <option value="VANESSA ARROYAVE">Vanessa Arroyave</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-4">
        <h3 class="mb-3">Resumen de la venta</h3>

        <div class="card">
          <div class="card-body">

            <p><strong>Cliente:</strong> <span id="resCliente">—</span></p>
            <p><strong>Cantidad pagos:</strong> <span id="resPlazo">—</span></p>
            <p><strong>Cantidad:</strong> <span id="resCantidad">—</span></p>
            <p><strong>Es crédito:</strong> <span id="resCredito">—</span></p>
            <p><strong>Primer abono:</strong> <span id="resPrimerAbono">—</span></p>
            <p><strong>Método de pago:</strong> <span id="resMetodoPago">—</span></p>

            <hr>

            <p><strong>Producto:</strong> <span id="resProducto">—</span></p>
            <p><strong>Precio:$</strong> <span id="resPrecio">—</span></p>
            <p><strong>Stock disponible:</strong> <span id="resStock">—</span></p>

            <hr>

            <p><strong>Socio:</strong> <span id="resSocio">—</span></p>

          </div>

          <div class="container text-center">
            <button type="submit" class="btn btn-primary mb-2">Vender</button>
          </div>

        </div>
      </div>
      
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tom Select JS (autocompletable select) -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

    <!-- Script to initialize Tom Select and load inventory data -->
    <script>
      // Inicializar Tom Select para el select de método de pago
      document.addEventListener('DOMContentLoaded', function () {
        loadSelectValue();
        loadInventoryData();
        loadClientsData();
      });

      function loadSelectValue(){
        try {
          new TomSelect('#paymentMethod', {
            create: false,
            maxItems: 1,
            allowEmptyOption: true,
            sortField: { field: 'text', direction: 'asc' }
          });

          // Inicializar Tom Select para socio
          new TomSelect('#socio', {
            create: false,
            maxItems: 1,
            allowEmptyOption: true,
            sortField: { field: 'text', direction: 'asc' }
          });
        } catch (e) {
          // Si ocurre algún error (por ejemplo el script no cargó), no romper la página
          console.warn('TomSelect no pudo inicializarse:', e);
        }
      }

      function loadInventoryData(){
        google.script.run
          .withSuccessHandler(pupulateProductSelect()) // La función que manejará la respuesta exitosa
          .getInventory(); // La función de Apps Script a ejecutar
      }

      function loadClientsData(){
        google.script.run
          .withSuccessHandler(pupulateClientsSelect()) // La función que manejará la respuesta exitosa
          .getClients(); // La función de Apps Script a ejecutar
      }

      function pupulateClientsSelect() {
        return function(optionsArray) {
          const selectElement = document.getElementById('clientName');

          // Manejar errores si la hoja no fue encontrada
          if (optionsArray.error) {
              selectElement.innerHTML = `<option value="">Error al cargar: ${optionsArray.error}</option>`;
              return;
          }
          // Limpiar opciones anteriores
          selectElement.innerHTML = '<option value="" disabled selected>Seleccione una opción</option>';
          for (const client of optionsArray) {
            const option = document.createElement('option');
            option.value = client.NOMBRE || '';
            option.textContent = `${client.NOMBRE || 'Sin nombre'} - ${client.CODIGO || ''}`;

            // Guardar código en atributo data-*
            option.dataset.code = client.CODIGO || 'Código no existe';

            selectElement.appendChild(option);
          }
          // Cuando el usuario seleccione un cliente, precargar código
          selectElement.addEventListener('change', function() {
            const selected = selectElement.options[selectElement.selectedIndex];
            const code = selected && selected.dataset ? selected.dataset.code : '';

            const codeInput = document.getElementById('clientCode');
            if (codeInput) codeInput.value = code || '';
            // Actualizar resumen si la función está definida
            if (typeof actualizarResumen === 'function') actualizarResumen();
          });
        };
      }

      function pupulateProductSelect() {
        return function(optionsArray) {
          const selectElement = document.getElementById('productName');
          const selectElementPlazo = document.getElementById('plazo');
          const selectElementAmount = document.getElementById('amount');
          
          // Manejar errores si la hoja no fue encontrada
          if (optionsArray.error) {
              selectElement.innerHTML = `<option value="">Error al cargar: ${optionsArray.error}</option>`;
              return;
          }

          // Limpiar opciones anteriores
          selectElement.innerHTML = '<option value="" disabled selected>Seleccione una opción</option>'; 

          for (const product of optionsArray) {
            const option = document.createElement('option');
            option.value = product.CODIGO || '';
            option.textContent = `${product.NOMBRE || 'Sin nombre'} - ${product.CODIGO || ''}`;
            option.dataset.price = product.UNO;
            option.dataset.priceDos = product.DOS;
            option.dataset.priceTres = product.TRES;
            option.dataset.priceCuatro = product.CUATRO;
            option.dataset.priceCinco = product.CINCO;
            option.dataset.stock = product.STOCK;
            option.dataset.code = product.CODIGO || 'Código no existe';

            selectElement.appendChild(option);
          }

          // Cuando el usuario seleccione un producto, precargar precio y stock
          selectElement.addEventListener('change', updateProductValues);
          selectElementPlazo.addEventListener('change', updateProductValues);
          selectElementAmount.addEventListener('input', updateProductValues);

          function updateProductValues() {
            const selected = selectElement.options[selectElement.selectedIndex];
            const productPrice = {
              UNO: selected.dataset.price,
              DOS: selected.dataset.priceDos,
              TRES: selected.dataset.priceTres,
              CUATRO: selected.dataset.priceCuatro,
              CINCO: selected.dataset.priceCinco
            };
            const price = selected && selected.dataset ? calculatePriceByPlazo(productPrice) : '';
            const stock = selected && selected.dataset ? selected.dataset.stock : '';
            const code = selected && selected.dataset ? selected.dataset.code : '';

            const priceInput = document.getElementById('priceProduct');
            const stockInput = document.getElementById('stockProduct');
            const codeInput = document.getElementById('productCode');

            if (priceInput) priceInput.value = price || '';
            if (stockInput) stockInput.value = stock || '';
            if (codeInput) codeInput.value = code || '';
            // Actualizar resumen si la función está definida
            if (typeof actualizarResumen === 'function') actualizarResumen();
          }
        };
      }

      function calculatePriceByPlazo(product) {
        console.log('Calculating price for product:', product);
        let priceResult // Precio base
        let plazo = document.getElementById("plazo").value || 'UNO';
        const amount = Number(document.getElementById("amount").value) || 1;
        switch (plazo) {
          case 'UNO':
            priceResult = product.UNO;
            break;
          case 'DOS':
            priceResult = product.DOS;
            break;
          case 'TRES':
            priceResult = product.TRES;
            break;
          case 'CUATRO':
            priceResult = product.CUATRO;
            break;
          case 'CINCO':
            priceResult = product.CINCO;
            break;
          default:
            priceResult = product.UNO;
        }
        return Number(priceResult * amount);
      }

    </script>

    <!-- Script to update summary -->
    <script> 
      function actualizarResumen() {
        document.getElementById("resCliente").innerText =
          document.getElementById("clientName").value || "—";

        document.getElementById("resPlazo").innerText =
          document.getElementById("plazo").value || "—";

        document.getElementById("resCantidad").innerText =
          document.getElementById("amount").value || "—";

        document.getElementById("resCredito").innerText =
          document.getElementById("checkIsCredict").checked ? "Sí" : "No";

        document.getElementById("resPrimerAbono").innerText =
          document.getElementById("firstPayment").value || "—";

        document.getElementById("resMetodoPago").innerText =
          document.getElementById("paymentMethod").value || "—";

        // Mostrar el texto de la opción seleccionada (ej: "Nombre - CODIGO") en lugar del value (código)
        const _prodSelect = document.getElementById("productName");
        document.getElementById("resProducto").innerText =
          (_prodSelect && _prodSelect.options[_prodSelect.selectedIndex] && _prodSelect.options[_prodSelect.selectedIndex].text) || "—";

        document.getElementById("resPrecio").innerText =
          document.getElementById("priceProduct").value || "—";

        document.getElementById("resStock").innerText =
          document.getElementById("stockProduct").value || "—";

        const socio = document.getElementById("socio");
        if (socio) {
          document.getElementById("resSocio").innerText =
            (socio.options[socio.selectedIndex] && socio.options[socio.selectedIndex].text) || "—";
        } else {
          // Fallback si por alguna razón no existe el select con id 'socio'
          const socioFallback = document.querySelector("#collapseSocio select");
          document.getElementById("resSocio").innerText =
            (socioFallback && socioFallback.options[socioFallback.selectedIndex] && socioFallback.options[socioFallback.selectedIndex].text) || "—";
        }
      }

      // Escuchar cambios en todos los inputs
      for (const elem of document.querySelectorAll("input, select")) {
        elem.addEventListener("input", actualizarResumen);
        elem.addEventListener("change", actualizarResumen);
      }

      // Inicializar resumen al cargar
      actualizarResumen();
    </script>

    <!-- Script to toggle first payment visibility -->
    <script>
      const checkIsCredict = document.getElementById("checkIsCredict");
      const firstPaymentContainer = document.getElementById("firstPaymentContainer");

      function toggleFirstPayment() {
        // La sección de cliente tiene el ID 'firstPaymentContainer'
        const firstPaymentContainerCliente = document.querySelector('#collapseCliente #firstPaymentContainer');

        if (checkIsCredict.checked) {
          // Mostrar el contenedor dentro de la sección Cliente
          if (firstPaymentContainerCliente) {
            firstPaymentContainerCliente.style.display = "block";
          }
        } else {
          // Ocultar el contenedor dentro de la sección Cliente
          if (firstPaymentContainerCliente) {
            firstPaymentContainerCliente.style.display = "none";
          }
          document.getElementById("firstPayment").value = ""; // limpiar si se oculta
        }
      }

      checkIsCredict.addEventListener("change", toggleFirstPayment);

      // Ocultar por defecto al cargar
      toggleFirstPayment();
    </script>

    <!-- Script to send sale information -->
    <script>
      function sendInformationSale(e, form){
        e.preventDefault();

        const data = Object.fromEntries(new FormData(form));
        data.checkIsCredict = form.checkIsCredict ? form.checkIsCredict.checked : false;

        console.log('Form result to send:', data);
        console.log('Form priceProduct:', data.priceProduct);
        console.log('Form isCredit:', data.checkIsCredict);
        google.script.run.createNewSale(data);
      }
    </script>

    <script>
    function formatCurrency(value) {
    if (typeof value !== 'number' || Number.isNaN(value)) {
            return ''; // Devuelve vacío si no es un número válido
        }
        return new Intl.NumberFormat('es-CO', { 
            style: 'currency', 
            currency: 'COP', // O 'USD', 'EUR', etc.
            minimumFractionDigits: 0 // No muestra decimales para números enteros
        }).format(value);
    }
    </script>

  </body>
</html>
